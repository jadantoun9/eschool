services:
  db:
    image: postgres:16-alpine
    container_name: eschool-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: eschool
      POSTGRES_PASSWORD: eschool
      POSTGRES_DB: eschool
    ports:
      - "5432:5432"
    volumes:
      - eschool_pgdata:/var/lib/postgresql/data

volumes:
  eschool_pgdata:
